  <style>
    html,
    body {
      min-height: 100vh;
      /* Fixed: Changed from height: 100% to prevent footer overlap */
      margin: 0;
      background-color: #121212;
      color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      letter-spacing: 0.03em;
    }

    /* Navbar - Exact Brand Styling */
    .navbar {
      background-color: #1f1f1f !important;
      position: relative;
      z-index: 10;
    }

    .navbar-brand,
    .nav-link {
      color: #f8f9fa !important;
    }

    .nav-link:hover {
      color: #ff3d00 !important;
    }

    /* Fixed Background Canvas */
    .page-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url(img/fire.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center 35%;
      z-index: 1;
    }

    /* Main Content Wrapper */
    .content-wrapper {
      position: relative;
      z-index: 2;
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px;
    }

    .page-header h1 {
      color: #fff;
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
      margin: 0;
    }

    .page-header .tagline {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      font-style: italic;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }

    /* Picture Display Container */
    .picture-container {
      max-width: 850px;
      /* Increased from 600px to make images larger and easier to read */
      width: 100%;
      margin-top: 50px;
    }

    /* Glassmorphic Media Module */
    .media-card {
      background: rgba(20, 20, 20, 0.75);
      border: 1px solid rgba(255, 61, 0, 0.15);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 61, 0, 0.03);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .media-card:hover {
      border-color: rgba(255, 61, 0, 0.4);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(255, 61, 0, 0.08);
    }

    /* Displayed Images */
    .media-card img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
      transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .media-card:hover img {
      transform: scale(1.02);
    }

    .media-caption {
      font-size: 0.8rem;
      font-family: monospace;
      color: #ff3d00;
      margin-top: 1.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Footer */
    .main-footer {
      background-color: #1f1f1f;
      color: #cfcfcf;
      padding: 40px 20px 20px 20px;
      font-size: 14px;
      margin-top: auto;
      position: relative;
      z-index: 10;
    }

    .main-footer a {
      color: #ff3d00;
      text-decoration: none;
    }

    .main-footer a:hover {
      text-decoration: underline;
    }

    .footer-bottom {
      border-top: 1px solid #333;
      padding-top: 15px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      font-size: 13px;
      color: #999;
    }

    /* Responsive tweaks */
    @media (max-width: 768px) {
      .page-header h1 {
        font-size: 2.5rem;
      }

      .media-card {
        padding: 1.5rem;
      }

      .footer-bottom {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
    }
  </style>
</head>

        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>

          <li class="nav-item">
            <a class="nav-link" href="books.html">Writing</a>

          <li class="nav-item">

  </nav>

  <!-- Fixed Background Element -->
  <div class="page-bg"></div>

  <!-- Main Scrollable Content Wrapper -->
  <main class="content-wrapper">
    <div class="page-header text-center">
      <h1>CUBICLE.CRUNCH.</h1>
      <p class="tagline">Laugh off the despair...</p>
    </div>

    <!-- Container for Content Modules -->
    <div class="container picture-container">
      <!-- Flex column wrapper with a Bootstrap gap-5 layout -->
      <div id="issues-grid" class="d-flex flex-column gap-5"></div>
    </div>

  <!-- Footer -->

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>

  <!-- Script to Dynamically Render Comic Issues (Newest First) -->
  <script>
    const container = document.getElementById('issues-grid');
    const totalIssues = 16;

    // Start at 16, loop down to 1
    for (let i = totalIssues; i >= 1; i--) {
      container.innerHTML += `
        <div class="media-card text-center">
          <img src="img/cubicleCrunch/${i}.jpg" alt="Crunch Issue ${i}" class="img-fluid" loading="lazy">
          <div class="media-caption">Issue #${i}</div>
        </div>
      `;
    }
  </script>
